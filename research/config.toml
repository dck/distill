[algorithms]
enabled = [
    "whole_book",
    "independent",
    "overlap_10",
    "overlap_20",
    "running_summary",
    "hierarchical",
    "incremental",
    "extract_compress",
]

[book]
format = "epub"
skip_front_matter = true

# Chapters to extract (1-indexed). If empty, extracts all content chapters.
# Selected for content-type diversity and cross-chapter reference density.
chapters = [3, 6, 9, 13, 16, 22]
