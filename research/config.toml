[settings]
judge_model = "claude-sonnet-4-6"
temperature = 0.3
eval_temperature = 0.0
free_model_delay_seconds = 8
retry_attempts = 3
retry_backoff_base = 2

[metrics_weights]
completeness = 0.35
structure = 0.25
coherence = 0.25
compression_quality = 0.15

